<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>腾讯云 COS 封禁搬移工具</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['"DM Sans"', 'system-ui', 'sans-serif'] },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  </head>
  <body class="min-h-screen bg-slate-100 font-sans text-slate-800 antialiased">
    <div class="max-w-6xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
      <header class="mb-8">
        <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 tracking-tight">
          腾讯云 COS 封禁搬移工具
        </h1>
        <p class="mt-1 text-sm text-slate-500">
          填写凭证后，粘贴 URL 列表或导入 TXT，批量提取 path 并搬移到指定前缀下，最后输出新的 URL 列表
        </p>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8">
        <section class="flex flex-col gap-5">
          <div class="rounded-xl bg-white shadow-sm border border-slate-200/80 p-5 sm:p-6">
            <h2 class="text-sm font-semibold text-slate-700 uppercase tracking-wider mb-4">
              配置
            </h2>
            <div class="space-y-4">
              <div>
                <label for="bucket" class="block text-sm font-medium text-slate-600 mb-1">Bucket</label>
                <input
                  id="bucket"
                  type="text"
                  name="bucket"
                  class="block w-full rounded-lg border-slate-300 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                  placeholder="bucket-111111111"
                />
              </div>

              <div>
                <label for="region" class="block text-sm font-medium text-slate-600 mb-1">Region</label>
                <input
                  id="region"
                  type="text"
                  name="region"
                  value="ap-guangzhou"
                  class="block w-full rounded-lg border-slate-300 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                  placeholder="ap-guangzhou"
                />
              </div>

              <div>
                <label for="secret_id" class="block text-sm font-medium text-slate-600 mb-1">SecretId</label>
                <input
                  id="secret_id"
                  type="text"
                  name="secret_id"
                  class="block w-full rounded-lg border-slate-300 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                  placeholder="AKID..."
                />
              </div>

              <div>
                <label for="secret_key" class="block text-sm font-medium text-slate-600 mb-1">SecretKey</label>
                <input
                  id="secret_key"
                  type="text"
                  name="secret_key"
                  class="block w-full rounded-lg border-slate-300 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                  placeholder="密钥"
                />
              </div>

              <div>
                <label for="ban-prefix" class="block text-sm font-medium text-slate-600 mb-1">搬移前缀</label>
                <input
                  id="ban-prefix"
                  type="text"
                  name="ban_prefix"
                  value="black-hole/"
                  class="block w-full rounded-lg border-slate-300 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 font-mono"
                  placeholder="black-hole/"
                />
                <p class="mt-1 text-xs text-slate-400">输入 black-hole/ 时，/foo/bar.jpg 会搬移为 /black-hole/foo/bar.jpg</p>
              </div>

              <div>
                <label for="host" class="block text-sm font-medium text-slate-600 mb-1">结果 Host</label>
                <input
                  id="host"
                  type="text"
                  name="host"
                  value="https://cdn4.codesign.qq.com"
                  class="block w-full rounded-lg border-slate-300 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 font-mono"
                  placeholder="https://cdn4.codesign.qq.com"
                />
              </div>

            </div>
          </div>
        </section>

        <section class="flex flex-col gap-5">
          <div class="rounded-xl bg-white shadow-sm border border-slate-200/80 p-5 sm:p-6">
            <h2 class="text-sm font-semibold text-slate-700 uppercase tracking-wider mb-4">
              URL 列表
            </h2>
            <div class="space-y-4">
              <div>
                <label for="url-list" class="block text-sm font-medium text-slate-600 mb-1">粘贴 URL 或 path 列表</label>
                <textarea
                  id="url-list"
                  rows="10"
                  class="auto-save-ignore block w-full rounded-lg border-slate-300 text-sm shadow-sm font-mono placeholder:text-slate-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                  placeholder="每行一条，支持完整 URL 或 /foo/bar.jpg 这样的 path"
                ></textarea>
              </div>

              <div>
                <label for="txt-file" class="block text-sm font-medium text-slate-600 mb-1">选择 TXT 文件</label>
                <input
                  id="txt-file"
                  type="file"
                  accept=".txt,text/plain"
                  class="auto-save-ignore block w-full text-sm text-slate-600 file:mr-3 file:rounded-lg file:border-0 file:bg-slate-100 file:px-4 file:py-2 file:text-sm file:font-medium file:text-slate-700 hover:file:bg-slate-200"
                />
                <p class="mt-1.5 text-xs text-slate-400" id="txt-file-hint">
                  导入后会自动填充到上方文本框，按行解析
                </p>
              </div>

              <div class="flex flex-wrap gap-2">
                <button
                  id="move-btn"
                  type="button"
                  class="px-4 py-2 text-sm font-medium rounded-lg bg-blue-600 text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                >
                  开始搬移
                </button>
                <button
                  id="copy-output-btn"
                  type="button"
                  class="px-4 py-2 text-sm font-medium rounded-lg border border-slate-300 text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2"
                >
                  复制结果 URL
                </button>
              </div>
            </div>
          </div>

          <div class="rounded-xl bg-white shadow-sm border border-slate-200/80 p-5 sm:p-6">
            <h2 class="text-sm font-semibold text-slate-700 uppercase tracking-wider mb-3">
              新 URL 列表
            </h2>
            <textarea
              id="output-urls"
              readonly
              rows="8"
              class="block w-full rounded-lg bg-slate-50 border border-slate-200 text-xs p-4 font-mono text-slate-700 whitespace-pre-wrap break-words overflow-auto focus:border-slate-300 focus:ring-0"
              placeholder="搬移成功后会在这里输出新的 URL 列表"
            ></textarea>
          </div>

          <div class="rounded-xl bg-white shadow-sm border border-slate-200/80 p-5 sm:p-6 flex-1 min-h-[220px]">
            <h2 class="text-sm font-semibold text-slate-700 uppercase tracking-wider mb-3">
              执行结果
            </h2>
            <pre
              id="result"
              class="block w-full min-h-[200px] rounded-lg bg-slate-50 border border-slate-200 text-xs p-4 font-mono text-slate-700 whitespace-pre-wrap break-words overflow-auto"
            ></pre>
          </div>
        </section>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
    <script>
      const resultContainer = document.getElementById("result");
      const outputUrls = document.getElementById("output-urls");
      const txtFileInput = document.getElementById("txt-file");
      const txtFileHint = document.getElementById("txt-file-hint");
      const moveBtn = document.getElementById("move-btn");

      document
        .querySelectorAll("input[name], textarea[name]")
        .forEach((el) => {
          const stored = localStorage.getItem(el.name);
          if (stored !== null) {
            el.value = stored;
          }
          el.addEventListener("input", function () {
            localStorage.setItem(el.name, el.value);
          });
        });

      function setResult(message, type) {
        resultContainer.classList.remove("text-red-500", "text-green-500");
        if (type === "error") {
          resultContainer.classList.add("text-red-500");
        }
        if (type === "success") {
          resultContainer.classList.add("text-green-500");
        }
        resultContainer.innerText = message;
      }

      function getValue(name) {
        const el = document.querySelector("[name='" + name + "']");
        return el ? el.value.trim() : "";
      }

      function normalizePrefix(prefix) {
        const cleaned = String(prefix || "black-hole/")
          .trim()
          .replace(/^\/+/, "")
          .replace(/\/+/g, "/")
          .replace(/\/+$/, "");
        return cleaned ? cleaned + "/" : "";
      }

      function normalizeHost(host) {
        const cleaned = String(host || "https://cdn4.codesign.qq.com").trim();
        return (cleaned || "https://cdn4.codesign.qq.com").replace(/\/+$/, "");
      }

      function normalizePath(raw) {
        const value = String(raw || "").trim();
        if (!value) {
          throw new Error("空行无法解析");
        }

        let pathname = value;
        if (/^https?:\/\//i.test(value)) {
          pathname = new URL(value).pathname;
        } else if (/^\/\//.test(value)) {
          pathname = new URL(window.location.protocol + value).pathname;
        } else {
          pathname = value.split(/[?#]/)[0];
        }

        pathname = pathname.trim();
        if (!pathname) {
          throw new Error("未解析出 path");
        }

        if (!pathname.startsWith("/")) {
          pathname = "/" + pathname;
        }

        pathname = pathname.replace(/\/+/g, "/");

        try {
          pathname = decodeURIComponent(pathname);
        } catch (e) {}

        return pathname;
      }

      function pathToKey(path) {
        return String(path || "").replace(/^\/+/, "");
      }

      function keyToPath(key) {
        return "/" + String(key || "").replace(/^\/+/, "");
      }

      function encodePathForUrl(path) {
        return path
          .split("/")
          .map((segment, index) => {
            if (index === 0) return "";
            return encodeURIComponent(segment);
          })
          .join("/");
      }

      function buildOutputUrl(host, key) {
        return normalizeHost(host) + encodePathForUrl(keyToPath(key));
      }

      function buildTargetKey(prefix, sourceKey) {
        return normalizePrefix(prefix) + pathToKey(sourceKey);
      }

      function escapeForCopySource(key) {
        return String(key)
          .split("/")
          .map((segment) => encodeURIComponent(segment))
          .join("/");
      }

      function parseLines(text) {
        const lines = String(text || "")
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean);

        if (!lines.length) {
          throw new Error("请先粘贴 URL 列表或导入 TXT 文件");
        }

        const entries = [];
        const seen = new Set();
        const duplicated = [];

        lines.forEach((line) => {
          const sourcePath = normalizePath(line);
          const sourceKey = pathToKey(sourcePath);
          if (!sourceKey) {
            throw new Error("无效 path：" + line);
          }
          if (seen.has(sourceKey)) {
            duplicated.push(sourcePath);
            return;
          }
          seen.add(sourceKey);
          entries.push({
            raw: line,
            sourcePath: sourcePath,
            sourceKey: sourceKey,
          });
        });

        return {
          entries: entries,
          totalLines: lines.length,
          duplicated: duplicated,
        };
      }

      function putObjectCopyAsync(cos, options) {
        return new Promise((resolve, reject) => {
          cos.putObjectCopy(options, function (err, data) {
            if (err) {
              reject(err);
              return;
            }
            resolve(data);
          });
        });
      }

      function deleteObjectAsync(cos, options) {
        return new Promise((resolve, reject) => {
          cos.deleteObject(options, function (err, data) {
            if (err) {
              reject(err);
              return;
            }
            resolve(data);
          });
        });
      }

      async function moveObject(cos, params) {
        const copySource =
          params.Bucket +
          ".cos." +
          params.Region +
          ".myqcloud.com/" +
          escapeForCopySource(params.SourceKey);

        await putObjectCopyAsync(cos, {
          Bucket: params.Bucket,
          Region: params.Region,
          Key: params.TargetKey,
          CopySource: copySource,
        });

        await deleteObjectAsync(cos, {
          Bucket: params.Bucket,
          Region: params.Region,
          Key: params.SourceKey,
        });
      }

      txtFileInput.onchange = function () {
        const file = this.files && this.files[0];
        if (!file) {
          txtFileHint.textContent = "导入后会自动填充到上方文本框，按行解析";
          return;
        }

        const reader = new FileReader();
        reader.onload = function () {
          const content = typeof reader.result === "string" ? reader.result : "";
          document.getElementById("url-list").value = content;
          txtFileHint.textContent = "已导入: " + file.name;
          setResult("已导入 TXT，可直接开始搬移", "success");
        };
        reader.onerror = function () {
          txtFileHint.textContent = "TXT 读取失败";
          setResult("TXT 读取失败，请重试", "error");
        };
        reader.readAsText(file);
      };

      document.getElementById("copy-output-btn").onclick = async function () {
        const text = outputUrls.value.trim();
        if (!text) {
          alert("当前没有可复制的结果 URL");
          return;
        }

        try {
          await navigator.clipboard.writeText(text);
          setResult("已复制结果 URL 列表", "success");
        } catch (e) {
          setResult("复制结果 URL 失败，请手动复制", "error");
        }
      };

      moveBtn.onclick = async function () {
        const Bucket = getValue("bucket");
        const Region = getValue("region");
        const SecretId = getValue("secret_id");
        const SecretKey = getValue("secret_key");
        const prefix = getValue("ban_prefix") || "black-hole/";
        const host = getValue("host") || "https://cdn4.codesign.qq.com";
        const rawText = document.getElementById("url-list").value;

        if (!Bucket || !Region || !SecretId || !SecretKey) {
          alert("请完整填写 Bucket、Region、SecretId、SecretKey");
          return;
        }

        let parsed;
        try {
          parsed = parseLines(rawText);
        } catch (e) {
          setResult(e.message || String(e), "error");
          return;
        }

        const cos = new COS({
          SecretId: SecretId,
          SecretKey: SecretKey,
        });

        moveBtn.disabled = true;
        outputUrls.value = "";
        setResult(
          "待处理: " + parsed.entries.length +
            "\n重复忽略: " + parsed.duplicated.length +
            "\n\n开始搬移..."
        );

        const successUrls = [];
        const logs = [];
        const failed = [];

        try {
          for (let i = 0; i < parsed.entries.length; i += 1) {
            const item = parsed.entries[i];
            const targetKey = buildTargetKey(prefix, item.sourceKey);
            const targetPath = keyToPath(targetKey);
            const outputUrl = buildOutputUrl(host, targetKey);

            if (targetKey === item.sourceKey) {
              logs.push("[跳过] " + item.sourcePath + " -> " + targetPath + "（目标与源相同）");
              successUrls.push(outputUrl);
              outputUrls.value = successUrls.join("\n");
              setResult(
                "处理中: " + (i + 1) + "/" + parsed.entries.length +
                  "\n\n" + logs.join("\n")
              );
              continue;
            }

            setResult(
              "处理中: " + (i + 1) + "/" + parsed.entries.length +
                "\n当前对象: " + item.sourcePath +
                "\n目标对象: " + targetPath +
                "\n\n" + logs.join("\n")
            );

            try {
              await moveObject(cos, {
                Bucket: Bucket,
                Region: Region,
                SourceKey: item.sourceKey,
                TargetKey: targetKey,
              });
              logs.push("[成功] " + item.sourcePath + " -> " + targetPath);
              successUrls.push(outputUrl);
              outputUrls.value = successUrls.join("\n");
            } catch (err) {
              const message = err && (err.message || err.error || err.toString())
                ? err.message || err.error || err.toString()
                : "未知错误";
              logs.push("[失败] " + item.sourcePath + " -> " + targetPath + " | " + message);
              failed.push({ item: item, targetPath: targetPath, message: message });
            }
          }

          const duplicatedText = parsed.duplicated.length
            ? "\n重复忽略:\n" + parsed.duplicated.join("\n")
            : "";
          const failedText = failed.length
            ? "\n\n失败列表:\n" + failed.map(function (entry) {
                return entry.item.sourcePath + " -> " + entry.targetPath + " | " + entry.message;
              }).join("\n")
            : "";

          setResult(
            "处理完成\n\n总行数: " + parsed.totalLines +
              "\n有效对象: " + parsed.entries.length +
              "\n成功: " + successUrls.length +
              "\n失败: " + failed.length +
              "\n重复忽略: " + parsed.duplicated.length +
              duplicatedText +
              "\n\n执行日志:\n" + logs.join("\n") +
              failedText,
            failed.length ? "error" : "success"
          );
        } finally {
          moveBtn.disabled = false;
        }
      };
    </script>
  </body>
</html>
